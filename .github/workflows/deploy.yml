name: Deploy to server

# main 分支每次 push（含 PR 合并产生的 merge commit）时触发部署
on:
  push:
    branches: [main]
  # 允许在 Actions 页面手动触发一次部署
  workflow_dispatch:

# 同一分支的部署串行执行；稳定优先：新部署排队等待前一个完成，
# 不中断正在进行的部署（避免 rsync 被中途取消导致服务器半同步状态）
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # pin 版本，避免未来 bun 升级导致 lockfile 兼容性问题
          bun-version: 1.3.0

      # Reason: 仓库的 bun.lock 由较早版本 bun 生成，bun 1.3.0 的 --frozen-lockfile
      # 会误判 lockfile 需要重新规范化而报 "lockfile had changes" 失败（实际依赖树无变化）。
      # 改用普通 install，仍受已提交的 bun.lock 约束，保证 CI 稳定。
      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      # rsync over SSH（密码认证）。sshpass 从 SSHPASS 读取密码，
      # 密码不会出现在进程列表 / 日志里；其余连接信息由 GitHub 自动 mask。
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # Reason: 全新 runner 没有服务器的 host key，仅靠 StrictHostKeyChecking=no
      # 在部分 ssh 配置下仍会报 "Host key verification failed"；
      # 配合 UserKnownHostsFile=/dev/null 彻底跳过 host key 校验。
      - name: Deploy dist via rsync
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sshpass -e rsync -az --delete \
            -e "ssh -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            dist/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}"
